<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Choose your username — Stanzle</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            background: #f9fafb;
            color: #111827;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
        }
        .wrap {
            max-width: 32rem;
            width: 100%;
            text-align: center;
        }
        .back {
            display: inline-block;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            color: #4b5563;
            text-decoration: underline;
        }
        .back:hover { color: #111827; }
        .logo {
            width: 4rem;
            height: 4rem;
            margin: 0 auto 2rem;
            border: 4px solid #111827;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
        }
        h1 {
            font-size: 1.875rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin: 0 0 0.5rem;
        }
        .sub {
            font-size: 1.125rem;
            color: #4b5563;
            line-height: 1.6;
            margin: 0 0 2rem;
        }
        label {
            display: block;
            text-align: left;
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.5rem;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 2px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 1rem;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #111827;
        }
        .form-group { margin-bottom: 1rem; text-align: left; }
        .err {
            color: #dc2626;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }
        .ok {
            color: #15803d;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }
        .preview {
            display: none;
            margin-top: 1rem;
            padding: 0.75rem;
            background: #f3f4f6;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            color: #6b7280;
            text-align: left;
        }
        .btn {
            width: 100%;
            margin-top: 1.25rem;
            padding: 0.75rem 2rem;
            background: #111827;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            border-radius: 9999px;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .btn:hover:not(:disabled) { background: #1f2937; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="wrap">
        <a href="/" class="back">← Back to home</a>
        <div class="logo" aria-hidden="true">S</div>
        <h1>Pick your username</h1>
        <p class="sub">Choose how you’ll appear on scores and progress. You can use letters, numbers, and underscores.</p>

        <form id="usernameForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required maxlength="20" placeholder="your_username" autocomplete="username">
                <div class="err" id="usernameError"></div>
                <div class="ok" id="usernameSuccess"></div>
            </div>
            <div class="preview" id="usernamePreview">
                Your username will be: <strong id="previewText"></strong>
            </div>
            <button type="submit" class="btn" id="submitBtn">Complete setup</button>
        </form>
    </div>

    <script>
        class UsernameSetup {
            constructor() {
                this.usernameInput = document.getElementById('username');
                this.usernameForm = document.getElementById('usernameForm');
                this.submitBtn = document.getElementById('submitBtn');
                this.errorMessage = document.getElementById('usernameError');
                this.successMessage = document.getElementById('usernameSuccess');
                this.preview = document.getElementById('usernamePreview');
                this.previewText = document.getElementById('previewText');
                this.submitDefaultLabel = this.submitBtn.textContent;
                this.setupEventListeners();
                this.checkForGoogleAuth();
            }

            setupEventListeners() {
                this.usernameInput.addEventListener('input', () => this.validateUsername());
                this.usernameForm.addEventListener('submit', (e) => this.handleSubmit(e));
            }

            checkForGoogleAuth() {
                const urlParams = new URLSearchParams(window.location.search);
                this.googleEmail = urlParams.get('email');
                this.googleName = urlParams.get('name');
                this.googleSetupToken = urlParams.get('token');
                const midGoogleSignup = Boolean(this.googleEmail && this.googleSetupToken);

                const existingToken = this.getAuthToken();
                if (existingToken && !midGoogleSignup) {
                    window.location.href = '/';
                    return;
                }

                if (this.googleEmail) {
                    this.usernameInput.value = this.suggestUsernameFromEmail(this.googleEmail);
                    this.validateUsername();
                }
            }

            suggestUsernameFromEmail(email) {
                const raw = (email || '').split('@')[0] || 'player';
                let s = raw.replace(/[^a-zA-Z0-9_]/g, '_').replace(/_+/g, '_');
                s = s.replace(/^_+|_+$/g, '');
                if (s.length < 3) {
                    s = (s + '_poet').slice(0, 20);
                }
                return s.slice(0, 20);
            }

            getAuthToken() {
                let token = localStorage.getItem('authToken');
                if (!token) {
                    const cookies = document.cookie.split(';');
                    for (let cookie of cookies) {
                        const [name, value] = cookie.trim().split('=');
                        if (name === 'authToken') {
                            token = value;
                            break;
                        }
                    }
                }
                return token;
            }

            validateUsername() {
                const username = this.usernameInput.value.trim();
                this.hideMessages();

                if (username.length < 3) {
                    this.showError('Username must be at least 3 characters long');
                    return false;
                }
                if (username.length > 20) {
                    this.showError('Username must be less than 20 characters');
                    return false;
                }
                if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                    this.showError('Username can only contain letters, numbers, and underscores');
                    return false;
                }

                this.previewText.textContent = username;
                this.preview.style.display = 'block';
                this.showSuccess('Username looks good!');
                return true;
            }

            async handleSubmit(e) {
                e.preventDefault();
                if (!this.validateUsername()) return;

                const username = this.usernameInput.value.trim();
                this.submitBtn.disabled = true;
                this.submitBtn.textContent = 'Please wait…';

                try {
                    const response = await fetch('/api/auth/setup-google-user', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username,
                            email: this.googleEmail || '',
                            name: this.googleName || ''
                        })
                    });
                    const result = await response.json();

                    if (result.success) {
                        if (result.token) {
                            localStorage.setItem('authToken', result.token);
                        }
                        window.location.href = '/';
                    } else {
                        this.submitBtn.disabled = false;
                        this.submitBtn.textContent = this.submitDefaultLabel;
                        this.showError(result.message || 'Failed to create account');
                    }
                } catch (err) {
                    this.submitBtn.disabled = false;
                    this.submitBtn.textContent = this.submitDefaultLabel;
                    this.showError('Network error. Please try again.');
                }
            }

            showError(message) {
                this.errorMessage.textContent = message;
                this.errorMessage.style.display = 'block';
                this.successMessage.style.display = 'none';
            }

            showSuccess(message) {
                this.successMessage.textContent = message;
                this.successMessage.style.display = 'block';
                this.errorMessage.style.display = 'none';
            }

            hideMessages() {
                this.errorMessage.style.display = 'none';
                this.successMessage.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new UsernameSetup();
        });
    </script>
</body>
</html>
